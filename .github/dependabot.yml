version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/nullshift"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      # Keep noise down: batch non-major updates into one PR per week.
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
