version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/nullshift"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Skip major bumps — they're usually breaking (TypeScript 6, zod 4, etc.) and
    # fail CI by design. Bump majors deliberately, by hand, when we're ready.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      # Keep noise down: batch non-major updates into one PR per week.
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
