<!-- @dsCard group="Colors" viewport="700x160" name="Signal — status only" subtitle="success · warning · info · danger" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; background: var(--bg); }
  .wrap { padding: 22px 28px; display: flex; flex-direction: column; gap: 14px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .sw { display: flex; flex-direction: column; gap: 7px; }
  .chip { height: 46px; border-radius: var(--radius-md); border: 1px solid var(--border-strong); }
  .name { font-family: var(--font-sans); font-size: var(--text-xs); font-weight: 600; color: var(--fg); }
  .hex { font-family: var(--font-mono); font-size: var(--text-mono-xs); color: var(--muted); }
  .note { font-family: var(--font-sans); font-size: var(--text-xs); color: var(--muted); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="grid">
      <div class="sw"><div class="chip" style="background: var(--success);"></div><div class="name">Success</div><div class="hex">#2BE08C</div></div>
      <div class="sw"><div class="chip" style="background: var(--warning);"></div><div class="name">Warning</div><div class="hex">#F5D547</div></div>
      <div class="sw"><div class="chip" style="background: var(--info);"></div><div class="name">Info</div><div class="hex">#3DD7E5</div></div>
      <div class="sw"><div class="chip" style="background: var(--danger);"></div><div class="name">Danger</div><div class="hex">#FF3A5C</div></div>
    </div>
    <div class="note">Signal colours communicate status — never used decoratively or as a second brand colour.</div>
  </div>
</body>
</html>
