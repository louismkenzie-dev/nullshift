<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; background: var(--bg); }
  .wrap { padding: 28px; display: flex; align-items: center; gap: 40px; }
  .lockup { display: inline-flex; align-items: center; gap: 12px; }
  .lockup img { height: 30px; }
  .word { font-family: var(--font-sans); font-weight: 800; font-size: 1.6rem; letter-spacing: 0.02em; color: var(--fg); }
  .rule { font-family: var(--font-mono); font-size: var(--text-mono-xs); color: var(--muted); line-height: 1.7; }
  .rule b { color: var(--primary); font-weight: 400; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="lockup">
      <img src="../assets/logos/nullshift-mark.svg" alt="Nullshift mark" />
      <span class="word">NULLSHIFT</span>
    </div>
    <div class="rule">
      <b>min width</b> 120px · clear space = mark width<br />
      light pill + emerald pill — never recoloured<br />
      near-black backgrounds only
    </div>
  </div>
</body>
</html>
