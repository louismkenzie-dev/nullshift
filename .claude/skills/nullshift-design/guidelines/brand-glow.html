<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; background: var(--bg); }
  .wrap { padding: 30px 28px; display: flex; flex-direction: column; gap: 6px; }
  .h { font-family: var(--font-sans); font-weight: 600; font-size: 2.4rem; line-height: 1.04; letter-spacing: -0.03em; color: var(--fg); }
  .glow { color: var(--primary); }
  .meta { font-family: var(--font-mono); font-size: var(--text-mono-sm); color: var(--muted); margin-top: 8px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="h">No templates. No bloat.</div>
    <div class="h glow ns-hero-glow">No nonsense.</div>
    <div class="meta">--glow-hero · pulse 3.6s · reserved for hero headlines + primary CTAs</div>
  </div>
</body>
</html>
