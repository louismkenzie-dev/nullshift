<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base grid" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; background: var(--bg); }
  .wrap { padding: 24px 28px; display: flex; gap: 14px; align-items: flex-end; }
  .sw { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .bar { background: var(--primary); width: 100%; border-radius: 2px; }
  .col { display: flex; flex-direction: column; gap: 8px; align-items: center; width: 30px; }
  .lab { font-family: var(--font-mono); font-size: var(--text-mono-xs); color: var(--muted); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="col"><div class="bar" style="height: var(--space-1);"></div><div class="lab">1·4</div></div>
    <div class="col"><div class="bar" style="height: var(--space-2);"></div><div class="lab">2·8</div></div>
    <div class="col"><div class="bar" style="height: var(--space-3);"></div><div class="lab">3·12</div></div>
    <div class="col"><div class="bar" style="height: var(--space-4);"></div><div class="lab">4·16</div></div>
    <div class="col"><div class="bar" style="height: var(--space-6);"></div><div class="lab">6·24</div></div>
    <div class="col"><div class="bar" style="height: var(--space-8);"></div><div class="lab">8·32</div></div>
    <div class="col"><div class="bar" style="height: var(--space-12);"></div><div class="lab">12·48</div></div>
    <div class="col"><div class="bar" style="height: var(--space-16);"></div><div class="lab">16·64</div></div>
  </div>
</body>
</html>
