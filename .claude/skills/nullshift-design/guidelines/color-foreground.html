<!-- @dsCard group="Colors" viewport="700x150" name="Foreground" subtitle="off-white → muted → faint" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; background: var(--bg); }
  .grid { padding: 22px 28px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .sw { display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 56px; border-radius: var(--radius-md); border: 1px solid var(--border); }
  .name { font-family: var(--font-sans); font-size: var(--text-sm); font-weight: 600; color: var(--fg); }
  .hex { font-family: var(--font-mono); font-size: var(--text-mono-sm); color: var(--muted); }
</style>
</head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background: var(--fg);"></div><div class="name">Foreground</div><div class="hex">#F2F4F8 · --fg</div></div>
    <div class="sw"><div class="chip" style="background: var(--muted);"></div><div class="name">Muted</div><div class="hex">#9AA0AE · --muted</div></div>
    <div class="sw"><div class="chip" style="background: var(--faint);"></div><div class="name">Faint</div><div class="hex">#5C6170 · --faint</div></div>
  </div>
</body>
</html>
