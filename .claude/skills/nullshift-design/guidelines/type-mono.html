<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; background: var(--bg); }
  .wrap { padding: 22px 28px; display: flex; flex-direction: column; gap: 12px; font-family: var(--font-mono); }
  .marker { font-size: var(--text-mono); color: var(--primary); letter-spacing: 0.1em; text-transform: uppercase; }
  .row { font-size: var(--text-sm); color: var(--fg); }
  .dim { color: var(--muted); }
  .meta { font-size: var(--text-mono-sm); color: var(--muted); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="marker">// 02 — COLOUR PALETTE</div>
    <div class="row">PROJ-2401 <span class="dim">·</span> £4,800 <span class="dim">·</span> 2–4 weeks</div>
    <div class="meta">JetBrains Mono · 400 / 500 / 600 · code, admin labels, reference IDs, system markers</div>
  </div>
</body>
</html>
