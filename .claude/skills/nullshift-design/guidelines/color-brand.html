<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; background: var(--bg); }
  .wrap { padding: 22px 28px; display: flex; flex-direction: column; gap: 14px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .sw { display: flex; flex-direction: column; gap: 7px; }
  .chip { height: 46px; border-radius: var(--radius-md); border: 1px solid var(--border-strong); }
  .name { font-family: var(--font-sans); font-size: var(--text-xs); font-weight: 600; color: var(--fg); }
  .hex { font-family: var(--font-mono); font-size: var(--text-mono-xs); color: var(--muted); }
  .note { font-family: var(--font-sans); font-size: var(--text-xs); color: var(--muted); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="grid">
      <div class="sw"><div class="chip" style="background: var(--primary);"></div><div class="name">Primary</div><div class="hex">#10B981</div></div>
      <div class="sw"><div class="chip" style="background: var(--primary-hover);"></div><div class="name">Hover</div><div class="hex">#34D399</div></div>
      <div class="sw"><div class="chip" style="background: var(--primary-pressed);"></div><div class="name">Pressed</div><div class="hex">#059669</div></div>
      <div class="sw"><div class="chip" style="background: var(--primary-soft); border-color: var(--primary);"></div><div class="name">Soft</div><div class="hex">12% alpha</div></div>
    </div>
    <div class="note">Emerald is reserved for CTAs, focus rings, active states, and the brand dot — never as decoration.</div>
  </div>
</body>
</html>
