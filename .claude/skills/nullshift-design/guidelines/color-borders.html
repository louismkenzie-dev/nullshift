<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; background: var(--bg); }
  .grid { padding: 22px 28px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .sw { display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 56px; border-radius: var(--radius-md); background: var(--surface); }
  .name { font-family: var(--font-sans); font-size: var(--text-sm); font-weight: 600; color: var(--fg); }
  .hex { font-family: var(--font-mono); font-size: var(--text-mono-sm); color: var(--muted); }
</style>
</head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="border: 1px solid var(--border);"></div><div class="name">Border</div><div class="hex">#2A2D38 · dividers, card outlines</div></div>
    <div class="sw"><div class="chip" style="border: 1px solid var(--border-strong);"></div><div class="name">Border strong</div><div class="hex">#3A3D4A · inputs, secondary buttons</div></div>
  </div>
</body>
</html>
