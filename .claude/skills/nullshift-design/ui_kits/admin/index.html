<!-- @startingPoint section="Admin CRM" subtitle="Nullshift admin dashboard with drawer nav" viewport="1180x760" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nullshift — Admin</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; height: 100%; background: var(--bg); }
  #app { height: 100vh; overflow-y: auto; }
  .admin-main { max-width: 1100px; margin: 0 auto; padding: 32px 24px 64px; }
  @media (max-width: 860px) { .ns-admin-grid { grid-template-columns: 1fr !important; } }
</style>
</head>
<body>
  <div id="app"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel" src="nav.jsx"></script>
  <script type="text/babel" src="views.jsx"></script>
  <script type="text/babel">
    const { AdminTopbar } = window.NSAdminNav;
    const { Dashboard, Enquiries } = window.NSAdmin;

    function App() {
      const [view, setView] = React.useState("Dashboard");
      const navigate = (label) => {
        setView(label === "Enquiries" ? "Enquiries" : "Dashboard");
        document.getElementById("app").scrollTo(0, 0);
      };
      return (
        <>
          <AdminTopbar active={view} onNavigate={navigate} />
          <main className="admin-main">
            {view === "Enquiries" ? <Enquiries /> : <Dashboard />}
          </main>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById("app")).render(<App />);
  </script>
</body>
</html>
