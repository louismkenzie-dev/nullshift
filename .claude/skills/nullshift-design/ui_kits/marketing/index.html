<!-- @startingPoint section="Marketing site" subtitle="Full Nullshift marketing page with brief modal" viewport="1180x760" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nullshift — Web &amp; brand studio</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; height: 100%; background: var(--bg); }
  #app { height: 100vh; overflow-y: auto; overflow-x: hidden; }
  @media (max-width: 720px) { .ns-hide-sm { display: none !important; } }
</style>
</head>
<body>
  <div class="ns-noise"></div>
  <div id="app" data-scroll-root></div>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel" src="sections.jsx"></script>
  <script type="text/babel" src="brief.jsx"></script>
  <script type="text/babel">
    const { MarketingNav, Hero, Services, Process, Pricing } = window.NSMarketing;
    const { Contact, MarketingFooter, BriefModal } = window.NSMarketing2;

    function App() {
      const [briefOpen, setBriefOpen] = React.useState(false);
      const open = () => setBriefOpen(true);
      return (
        <>
          <MarketingNav onBook={open} />
          <Hero onBook={open} />
          <Services />
          <Process />
          <Pricing onBook={open} />
          <Contact onBook={open} />
          <MarketingFooter />
          <BriefModal open={briefOpen} onClose={() => setBriefOpen(false)} />
        </>
      );
    }

    // Render the scrolling page inside #app, modal at root (fixed overlay)
    ReactDOM.createRoot(document.getElementById("app")).render(<App />);
  </script>
</body>
</html>
